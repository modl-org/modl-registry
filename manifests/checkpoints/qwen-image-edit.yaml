license: apache-2.0
homepage: https://huggingface.co/Qwen/Qwen-Image-Edit
description: |
  AI-powered image editing model based on Qwen 2.5 VL architecture.
  Supports instruction-based editing, outpainting, format/ratio changes,
  AI scene generation, and in-place enhancement.
  Three versions: original (2509 base), 2509 revision, and 2511 "Plus".

